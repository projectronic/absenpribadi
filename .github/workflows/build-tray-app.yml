name: Build Absen Pribadi Tray App (Windows)

on:
  push:
    branches: [main]
    paths:
      - "absen_tray/**"
      - "run.py"
      - "requirements.txt"
      - "absen-pribadi.html"
      - "version_info.txt"
      - ".github/workflows/build-tray-app.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        # --version-file menambahkan metadata (nama produk, publisher, versi) ke exe —
        # exe tanpa metadata ini salah satu sinyal yang bikin SmartScreen curiga.
        run: pyinstaller --onefile --windowed --name AbsenPribadi --add-data "absen-pribadi.html;." --version-file version_info.txt run.py

      - uses: actions/upload-artifact@v4
        with:
          name: AbsenPribadi-windows
          path: dist/AbsenPribadi.exe

      - name: Publish/replace GitHub Release "latest"
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # BUKAN --prerelease: endpoint /releases/latest (dipakai link download permanen
          # di README) secara khusus mengabaikan release yang ditandai prerelease/draft,
          # jadi kalau ditandai prerelease link publiknya akan selalu 404.
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest dist/AbsenPribadi.exe \
            --title "AbsenPribadi (build terbaru)" \
            --notes "Build otomatis dari commit ${{ github.sha }}."
